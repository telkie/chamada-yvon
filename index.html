<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamada Yvon 🌳</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        
        /* HEADER */
        .top-panel { position: sticky; top: 0; z-index: 900; background-color: #121212; padding: 10px; border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .user-bar { font-size: 0.8rem; color: #888; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn-sair { color: #ff6b6b; text-decoration: none; }
        
        /* CARD ALUNO */
        .aluno-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.1s; }
        .aluno-card.selected { background-color: #052c18; border-color: #0f5132; }
        .check-icon { opacity: 0; color: #2ecc71; transform: scale(0.5); transition: 0.2s; }
        .aluno-card.selected .check-icon { opacity: 1; transform: scale(1.2); }

        /* FABs */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .fab { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
        .btn-camera { background-color: #3498db; color: white; }
        .btn-save { background-color: #2ecc71; color: white; }

        /* LOADING OVERLAY (NOVIDADE) */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .spinner-custom { width: 3rem; height: 3rem; border: 5px solid #333; border-top: 5px solid #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* CÂMERA E CHARME */
        #qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; display: none; flex-direction: column; }
        #reader { width: 100%; flex-grow: 1; background: black; }
        .qr-controls { padding: 20px; background: #1e1e1e; text-align: center; }
        #aluno-found-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2001; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .aluno-found-name { font-size: 2rem; color: #2ecc71; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .btn-big-check { width: 100px; height: 100px; border-radius: 50%; font-size: 40px; background: #2ecc71; color: white; border: none; box-shadow: 0 0 30px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner-custom"></div>
        <h4 class="text-light fw-bold">Enviando...</h4>
        <small class="text-muted">Por favor, aguarde.</small>
    </div>

    <div class="top-panel">
        <div class="user-bar">
            <span>👤 {{ usuario }}</span>
            <a href="/logout" class="btn-sair">Sair</a>
        </div>
        
        <select id="select-turma" class="form-select form-select-sm mb-2 bg-dark text-light border-secondary" onchange="mudarTurma()">
            <option value="" disabled selected>Escolha a Turma...</option>
            {% for t in turmas %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
        </select>

        <div class="d-flex gap-2">
            <input type="date" id="data-picker" class="form-control form-control-sm bg-dark text-light border-secondary">
            <button class="btn btn-sm btn-outline-danger" onclick="enviarSemAula()">Sem Aula</button>
        </div>
        <div class="text-end mt-1">
            <small id="contador" class="text-muted">0 selecionados</small>
        </div>
    </div>

    <div class="container mt-3" id="lista-alunos">
        <div class="text-center text-muted mt-5">Selecione uma turma para começar.</div>
    </div>

    <div class="fab-container">
        <button class="fab btn-camera" onclick="abrirCamera()"><i class="fas fa-camera"></i></button>
        <button class="fab btn-save" onclick="enviarPresenca()"><i class="fas fa-check"></i></button>
    </div>

    <div id="qr-overlay">
        <div id="reader"></div>
        <div class="qr-controls">
            <h4 class="text-light">Aponte para o QR Code</h4>
            <button class="btn btn-secondary w-100 mt-2" onclick="fecharCamera()">Fechar</button>
        </div>
    </div>

    <div id="aluno-found-overlay">
        <div class="text-light mb-2">Aluno Identificado:</div>
        <div class="aluno-found-name" id="found-name">...</div>
        <button class="btn-big-check" onclick="confirmarAlunoScan()"><i class="fas fa-check"></i></button>
        <button class="btn btn-link text-muted mt-4" onclick="fecharFound()">Cancelar</button>
    </div>

    <script>
        const socket = io();
        let alunosData = [];
        let mapaIds = {}; 
        let selecionados = new Set();
        let turmaAtual = "";
        let html5QrcodeScanner = null;
        let scannedIdTemp = null;
        let scannedNameTemp = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- LOADING CONTROL ---
        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        // AUTO-SELECT
        window.onload = function() {
            const select = document.getElementById('select-turma');
            if (select.options.length > 1) {
                select.selectedIndex = 1;
                mudarTurma();
            }
        }

        function playBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1); 
        }

        function falarNome(texto) {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }
        
        function mudarTurma() {
            const t = document.getElementById('select-turma').value;
            // Mostra loading na lista, mas não bloqueia a tela inteira pra isso (opcional)
            document.getElementById('lista-alunos').innerHTML = '<div class="text-center mt-5 text-success">Baixando lista... <i class="fas fa-circle-notch fa-spin"></i></div>';
            socket.emit('selecionar_turma', { turma: t });
        }

        socket.on('dados_turma', (data) => {
            turmaAtual = data.turma_nome;
            alunosData = data.alunos;
            mapaIds = data.mapa_ids;
            document.getElementById('data-picker').value = data.data_default;
            selecionados.clear();
            renderizarLista();
        });

        socket.on('sucesso', (data) => {
            hideLoading(); // Libera a tela
            alert(data.msg);
            selecionados.clear();
            renderizarLista();
        });

        socket.on('erro', (msg) => {
            hideLoading(); // Libera a tela em caso de erro também
            alert(msg.msg);
        });

        function renderizarLista() {
            const container = document.getElementById('lista-alunos');
            container.innerHTML = '';
            alunosData.forEach(nome => {
                const isSelected = selecionados.has(nome);
                const div = document.createElement('div');
                div.className = `aluno-card ${isSelected ? 'selected' : ''}`;
                div.onclick = () => toggleAluno(nome);
                div.innerHTML = `<span>${nome}</span><i class="fas fa-check check-icon"></i>`;
                container.appendChild(div);
            });
            document.getElementById('contador').innerText = `${selecionados.size} marcados`;
        }

        function toggleAluno(nome) {
            if (selecionados.has(nome)) selecionados.delete(nome); else selecionados.add(nome);
            renderizarLista();
        }

        function checkSabado(dateStr) {
            const parts = dateStr.split('-');
            const diaCerto = new Date(parts[0], parts[1]-1, parts[2], 12, 0, 0);
            return diaCerto.getDay() === 6;
        }

        function enviarPresenca() {
            if (!turmaAtual) return alert("Selecione a turma!");
            const dt = document.getElementById('data-picker').value;
            if (!checkSabado(dt)) return alert("🚫 Esta data NÃO é um sábado!");
            
            // ATIVAR LOADING
            showLoading();
            
            socket.emit('registrar_chamada', { tipo: 'presenca', turma_atual: turmaAtual, data: dt, presentes: Array.from(selecionados) });
        }

        function enviarSemAula() {
            if (!turmaAtual) return alert("Selecione a turma!");
            const dt = document.getElementById('data-picker').value;
            if (!checkSabado(dt)) return alert("🚫 Esta data NÃO é um sábado!");
            
            if(confirm("Confirmar SEM AULA?")) {
                showLoading(); // ATIVAR LOADING
                socket.emit('registrar_chamada', { tipo: 'sem_aula', turma_atual: turmaAtual, data: dt });
            }
        }

        // --- CÂMERA ---
        function abrirCamera() {
            if (!turmaAtual) return alert("Selecione uma turma primeiro!");
            
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                alert("⚠️ USE HTTPS (NGROK) PARA HABILITAR A CÂMERA");
            }

            document.getElementById('qr-overlay').style.display = 'flex';
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("Erro ao abrir câmera: " + err);
                fecharCamera();
            });
        }

        function fecharCamera() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('qr-overlay').style.display = 'none';
                }).catch(err => {
                    document.getElementById('qr-overlay').style.display = 'none';
                });
            } else {
                document.getElementById('qr-overlay').style.display = 'none';
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.pause();
            const idLido = decodedText.trim();
            const nomeEncontrado = mapaIds[idLido];
            if (nomeEncontrado) {
                scannedNameTemp = nomeEncontrado;
                document.getElementById('qr-overlay').style.display = 'none'; 
                document.getElementById('found-name').innerText = nomeEncontrado;
                document.getElementById('aluno-found-overlay').style.display = 'flex';
            } else {
                alert("ID não encontrado: " + idLido);
                html5QrcodeScanner.resume();
            }
        }

        function confirmarAlunoScan() {
            playBeep();
            falarNome(scannedNameTemp);
            selecionados.add(scannedNameTemp);
            renderizarLista();
            document.getElementById('aluno-found-overlay').style.display = 'none';
            document.getElementById('qr-overlay').style.display = 'flex';
            html5QrcodeScanner.resume();
        }

        function fecharFound() {
            document.getElementById('aluno-found-overlay').style.display = 'none';
            document.getElementById('qr-overlay').style.display = 'flex';
            html5QrcodeScanner.resume();
        }
    </script>
</body>
</html>
