<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chamada Yvon 🌳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background-color: #1e1e1e; padding: 2rem; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .form-control { background-color: #2c2c2c; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #333; color: white; border-color: #2ecc71; box-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
        .btn-verde { background-color: #2ecc71; border: none; width: 100%; padding: 10px; font-weight: bold; color: #000; }
        .btn-verde:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4">🌳 Acesso Evangelizadores</h3>
        
        {% if erro %}
        <div class="alert alert-danger text-center p-2">{{ erro }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Login</label>
                <input type="text" name="login" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-verde">ENTRAR</button>
        </form>
    </div>
</body>
</html>
